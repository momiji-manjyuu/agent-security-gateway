<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Agent Security Gateway Architecture</title>
  <desc id="desc">Callers request routes from Agent Security Gateway. The gateway authenticates, enforces policy, forwards with backend credentials, guards output, and writes audit logs.</desc>
  <rect width="920" height="360" fill="#f7f7f4"/>
  <g font-family="Arial, sans-serif" font-size="15" fill="#1f2933">
    <rect x="40" y="54" width="170" height="70" rx="8" fill="#ffffff" stroke="#334e68"/>
    <text x="125" y="84" text-anchor="middle" font-weight="700">Mac / GPT-5.5</text>
    <text x="125" y="106" text-anchor="middle">privileged_core</text>
    <rect x="40" y="154" width="170" height="70" rx="8" fill="#ffffff" stroke="#334e68"/>
    <text x="125" y="184" text-anchor="middle" font-weight="700">Pi web DMZ</text>
    <text x="125" y="206" text-anchor="middle">untrusted intake</text>
    <rect x="310" y="72" width="260" height="170" rx="8" fill="#e8f4f8" stroke="#0b7285" stroke-width="2"/>
    <text x="440" y="104" text-anchor="middle" font-size="18" font-weight="700">Agent Security Gateway</text>
    <text x="440" y="134" text-anchor="middle">authenticate caller</text>
    <text x="440" y="158" text-anchor="middle">resolve route_id</text>
    <text x="440" y="182" text-anchor="middle">run, taint, action policy</text>
    <text x="440" y="206" text-anchor="middle">output guard + audit</text>
    <rect x="700" y="44" width="180" height="58" rx="8" fill="#ffffff" stroke="#334e68"/>
    <text x="790" y="79" text-anchor="middle" font-weight="700">Pi backend</text>
    <rect x="700" y="126" width="180" height="58" rx="8" fill="#ffffff" stroke="#334e68"/>
    <text x="790" y="161" text-anchor="middle" font-weight="700">Ubuntu knowledge</text>
    <rect x="700" y="208" width="180" height="58" rx="8" fill="#ffffff" stroke="#334e68"/>
    <text x="790" y="243" text-anchor="middle" font-weight="700">Sandbox / GPU</text>
    <rect x="310" y="280" width="260" height="44" rx="8" fill="#fff8e1" stroke="#8d6e00"/>
    <text x="440" y="307" text-anchor="middle" font-weight="700">append-only JSONL audit hash chain</text>
  </g>
  <g stroke="#334e68" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M210 89 L310 126"/>
    <path d="M210 189 L310 189"/>
    <path d="M570 126 L700 73"/>
    <path d="M570 156 L700 155"/>
    <path d="M570 196 L700 237"/>
    <path d="M440 242 L440 280"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334e68"/>
    </marker>
  </defs>
</svg>
