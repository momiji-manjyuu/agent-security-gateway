<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Security Proxy Architecture</title>
  <desc id="desc">An untrusted agent calls Agent Security Proxy through a LAN, VPN, or TLS boundary. The proxy enforces authentication, capability policy, input and output guards, and audit logging before forwarding to a backend AI agent runtime.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 10; }
      .proxy { fill: #ecfeff; stroke: #0e7490; stroke-width: 2.5; rx: 10; }
      .audit { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .guard { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
      .text { font-family: Arial, "Segoe UI", sans-serif; fill: #0f172a; }
      .muted { fill: #475569; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="520"/>
  <rect class="zone" x="260" y="50" width="610" height="420" rx="18"/>
  <text class="text label" x="565" y="88" text-anchor="middle">Trusted local boundary</text>
  <text class="text small muted" x="565" y="114" text-anchor="middle">LAN / VPN / TLS termination / private network controls</text>

  <rect class="box" x="35" y="190" width="175" height="120"/>
  <text class="text label" x="122.5" y="230" text-anchor="middle">Untrusted</text>
  <text class="text label" x="122.5" y="258" text-anchor="middle">agent</text>
  <text class="text small muted" x="122.5" y="287" text-anchor="middle">Bearer token</text>

  <rect class="proxy" x="330" y="160" width="260" height="180"/>
  <text class="text label" x="460" y="205" text-anchor="middle">Agent Security</text>
  <text class="text label" x="460" y="234" text-anchor="middle">Proxy</text>
  <text class="text small muted" x="460" y="267" text-anchor="middle">Identity and rate limits</text>
  <text class="text small muted" x="460" y="291" text-anchor="middle">Capability gate</text>
  <text class="text small muted" x="460" y="315" text-anchor="middle">Payload reconstruction</text>

  <rect class="guard" x="330" y="365" width="260" height="76"/>
  <text class="text small" x="460" y="395" text-anchor="middle">Input guard + output guard</text>
  <text class="text tiny muted" x="460" y="420" text-anchor="middle">prompt injection, secrets, local paths, risky URLs</text>

  <rect class="box" x="710" y="190" width="210" height="120"/>
  <text class="text label" x="815" y="230" text-anchor="middle">Backend AI</text>
  <text class="text label" x="815" y="258" text-anchor="middle">agent runtime</text>
  <text class="text small muted" x="815" y="287" text-anchor="middle">sandboxed tools</text>

  <rect class="audit" x="710" y="350" width="210" height="90"/>
  <text class="text label" x="815" y="388" text-anchor="middle">Audit JSONL</text>
  <text class="text small muted" x="815" y="418" text-anchor="middle">hash chain + write lock</text>

  <rect class="box" x="970" y="190" width="115" height="120"/>
  <text class="text label" x="1027.5" y="235" text-anchor="middle">Caller</text>
  <text class="text small muted" x="1027.5" y="264" text-anchor="middle">sanitized</text>
  <text class="text small muted" x="1027.5" y="287" text-anchor="middle">response</text>

  <path class="line" d="M210 250 H320"/>
  <text class="text tiny muted" x="265" y="232" text-anchor="middle">OpenAI-compatible request</text>

  <path class="line" d="M590 250 H700"/>
  <text class="text tiny muted" x="645" y="232" text-anchor="middle">fixed backend contract</text>

  <path class="line" d="M815 310 V340"/>
  <path class="line" d="M590 395 H700"/>
  <text class="text tiny muted" x="645" y="376" text-anchor="middle">event record</text>

  <path class="line dash" d="M920 250 H960"/>
  <text class="text tiny muted" x="940" y="232" text-anchor="middle">guarded output</text>
</svg>
