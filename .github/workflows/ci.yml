name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile gateway.py proxy.py tests/test_gateway.py scripts/init_runtime_config.py scripts/generate_token.py scripts/smoke_test.py scripts/eval_redteam.py
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Red-team corpus
        run: python scripts/eval_redteam.py --min-detection 1.0 --max-false-positive 0.0
      - name: Validate example config
        run: python gateway.py --config config.example.json validate-config
      - name: Validate JSON files
        run: |
          python -m json.tool config.example.json >/dev/null
          python -m json.tool schemas/config.schema.json >/dev/null
